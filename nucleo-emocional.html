<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reorganização do Núcleo Emocional — O Código Interno</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{

--bg:#060507;
--surface:#0f0d11;
--surface2:#16131a;

--gold:#c6a756;
--gold-light:#e6c979;
--gold-dim:rgba(198,167,86,.15);

--cream:#f1ece3;
--muted:rgba(241,236,227,.45);

}

body{

background:var(--bg);
color:var(--cream);
font-family:'DM Sans',sans-serif;
min-height:100vh;

}

.app{

max-width:720px;
margin:auto;
padding-bottom:120px;

}

.topbar{

text-align:center;
padding:18px;
border-bottom:1px solid rgba(198,167,86,.15);

}

.topbar p{

font-size:.6rem;
letter-spacing:.45em;
text-transform:uppercase;
color:rgba(198,167,86,.45);

}

.intro{

padding:80px 30px;
text-align:center;

}

.intro-symbol{

font-family:'Cinzel',serif;
font-size:48px;
color:rgba(198,167,86,.25);
margin-bottom:20px;

}

h1{

font-family:'Cormorant Garamond',serif;
font-weight:300;
font-size:40px;
margin-bottom:10px;

}

h1 em{

font-style:italic;
color:var(--gold-light);

}

.desc{

max-width:420px;
margin:auto;
font-size:.9rem;
line-height:1.8;
color:var(--muted);
margin-bottom:40px;

}

.btn{

background:var(--gold);
color:#000;
border:none;
padding:14px 26px;
cursor:pointer;
font-size:.8rem;
letter-spacing:.15em;
text-transform:uppercase;

}

.chat{

display:none;
padding:30px;

}

.message{

margin-bottom:20px;
line-height:1.7;

}

.message strong{

color:var(--gold);

}

.user{

color:var(--gold-light);
font-style:italic;

}

input{

width:100%;
background:var(--surface2);
border:1px solid rgba(198,167,86,.3);
padding:12px;
color:white;
margin-top:10px;

}

.send{

margin-top:10px;
background:var(--gold);
border:none;
padding:10px 20px;
cursor:pointer;

}

.result{

display:none;
padding:40px 30px;

}

.result h2{

font-family:'Cormorant Garamond',serif;
font-size:34px;
margin-bottom:20px;

}

.result p{

line-height:1.9;
margin-bottom:14px;

}

</style>

</head>

<body>

<div class="app">

<div class="topbar">
<p>O Código Interno · Ravel Dunningham</p>
</div>

<div class="intro" id="intro">

<div class="intro-symbol">◊</div>

<h1>Reorganização do<br><em>Núcleo Emocional</em></h1>

<p class="desc">
Esta dinâmica permite localizar os vínculos simbólicos que mantêm áreas da vida presas a padrões inconscientes.
</p>

<button class="btn" onclick="start()">Iniciar Dinâmica</button>

</div>

<div class="chat" id="chat"></div>

<div class="result" id="result">

<h2>Sua Leitura Simbólica</h2>

<div id="resultText"></div>

<button class="btn" onclick="gerarPDF()">Baixar PDF</button>

</div>

</div>

<script>

let step=0

const state={}

const chat=document.getElementById("chat")

function addMsg(text){

const div=document.createElement("div")

div.className="message"

div.innerHTML=text

chat.appendChild(div)

window.scrollTo(0,document.body.scrollHeight)

}

function addInput(){

const input=document.createElement("input")

input.id="input"

chat.appendChild(input)

const btn=document.createElement("button")

btn.className="send"

btn.innerText="Enviar"

btn.onclick=send

chat.appendChild(btn)

input.focus()

}

function start(){

document.getElementById("intro").style.display="none"

chat.style.display="block"

next()

}

function send(){

const v=document.getElementById("input").value

if(!v)return

addMsg("<div class='user'>"+v+"</div>")

document.getElementById("input").remove()

document.querySelector(".send").remove()

save(v)

step++

next()

}

function save(v){

if(step==0)state.nome=v
if(step==1)state.area=v
if(step==2)state.alvo=v
if(step==3)state.sala=v
if(step==4)state.mesa=v
if(step==5)state.objeto=v
if(step==6)state.vinculo=v
if(step==7)state.dependencia=v
if(step==8)state.porta=v

}

function next(){

const perguntas=[

"Como posso te chamar?",

"Qual área da sua vida parece travada agora?",

"Qual pessoa aparece quando você pensa nisso?",

"Imagine uma sala. Como ela é?",

"Existe uma mesa nessa sala?",

"Existe algo em cima da mesa?",

"Existe algo ligando você e essa pessoa?",

"Esse vínculo puxa mais você ou a outra pessoa?",

"O que existe do outro lado da porta?"

]

if(step<perguntas.length){

addMsg(perguntas[step])

addInput()

}else{

gerarResultado()

}

}

function gerarResultado(){

chat.style.display="none"

document.getElementById("result").style.display="block"

let texto=`

<p><strong>${state.nome}</strong>, os símbolos que surgiram indicam uma estrutura emocional ligada a <strong>${state.area}</strong>.</p>

<p>A presença de <strong>${state.alvo}</strong> revela um vínculo simbólico que ainda influencia suas decisões.</p>

<p>A sala descrita como "${state.sala}" indica o estado emocional onde essa dinâmica opera.</p>

<p>O objeto "${state.objeto}" mostra aquilo que você ainda carrega dessa relação.</p>

<p>O vínculo descrito como "${state.vinculo}" revela a forma como essa energia circula entre vocês.</p>

<p>Quando você atravessa a porta e encontra "${state.porta}", o inconsciente mostra qual é o caminho de reorganização desse núcleo.</p>

<p><em>Quando esse símbolo é integrado conscientemente, a área de ${state.area} tende a se reorganizar.</em></p>

`

document.getElementById("resultText").innerHTML=texto

}

async function gerarPDF(){

const { jsPDF } = window.jspdf

const doc = new jsPDF()

const text = document.getElementById("resultText").innerText

const split = doc.splitTextToSize(text, 180)

doc.text(split,20,30)

doc.save("analise-nucleo-emocional.pdf")

}

</script>

</body>

</html>
