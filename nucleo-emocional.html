<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reorganização do Núcleo Emocional | O Código Interno</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Libre Baskerville', serif;
background:#0f0f0f;
color:#eaeaea;
}

header{
text-align:center;
padding:40px 20px;
border-bottom:1px solid #333;
}

.logo{
font-family:'Cinzel', serif;
font-size:36px;
letter-spacing:3px;
}

.container{
max-width:800px;
margin:auto;
padding:40px 25px;
}

.step{
display:none;
}

.step.active{
display:block;
}

h2{
font-family:'Cinzel', serif;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
background:#1a1a1a;
border:1px solid #444;
color:#fff;
font-size:14px;
}

button{
background:#eaeaea;
color:#111;
padding:12px 26px;
border:none;
font-family:'Cinzel', serif;
cursor:pointer;
}

button:hover{
background:white;
}

.progress{
height:4px;
background:#222;
margin-bottom:30px;
}

.progress-bar{
height:4px;
background:#eaeaea;
width:0%;
transition:0.4s;
}

.resultado{
display:none;
background:#151515;
padding:30px;
margin-top:30px;
border:1px solid #333;
}

footer{
text-align:center;
padding:40px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<header>

<div class="logo">
O CÓDIGO INTERNO
</div>

</header>

<div class="container">

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<form id="form">

<!-- ETAPA 1 -->

<div class="step active">

<h2>Área da Vida</h2>

<p>Qual área da sua vida parece travada neste momento?</p>

<select name="area">
<option>Dinheiro</option>
<option>Relacionamentos</option>
<option>Saúde</option>
</select>

<p>Quando você pensa nessa área, qual é a primeira pessoa que vem à sua mente?</p>

<input name="alvo">

<button type="button" onclick="next()">Continuar</button>

</div>

<!-- ETAPA 2 -->

<div class="step">

<h2>A Sala</h2>

<p>Imagine uma sala.</p>

<input name="sala" placeholder="Como é essa sala?">

<input name="luz" placeholder="Como está a iluminação?">

<input name="som" placeholder="Existe algum som ou cheiro?">

<button type="button" onclick="next()">Continuar</button>

</div>

<!-- ETAPA 3 -->

<div class="step">

<h2>Mesa da Maturidade</h2>

<input name="posicao" placeholder="Onde você está na mesa?">

<input name="posicaoAlvo" placeholder="Onde está a outra pessoa?">

<input name="objetoMesa" placeholder="Existe algo em cima da mesa?">

<button type="button" onclick="next()">Continuar</button>

</div>

<!-- ETAPA 4 -->

<div class="step">

<h2>O Vínculo</h2>

<input name="vinculo" placeholder="Existe algo ligando vocês?">

<select name="dependencia">

<option>Eu sou puxado</option>
<option>A pessoa é puxada</option>
<option>Equilibrado</option>

</select>

<button type="button" onclick="next()">Continuar</button>

</div>

<!-- ETAPA 5 -->

<div class="step">

<h2>Objeto</h2>

<input name="objeto" placeholder="Você carrega algum objeto dessa pessoa?">

<button type="button" onclick="next()">Continuar</button>

</div>

<!-- ETAPA 6 -->

<div class="step">

<h2>Distanciamento</h2>

<select name="distancia">

<option>Me afastar</option>
<option>Ver a pessoa diminuir</option>

</select>

<input name="pedra" placeholder="Existe uma pedra ou algo no caminho?">

<button type="button" onclick="gerar()">Finalizar</button>

</div>

</form>

<div class="resultado" id="resultado">

<h2>Leitura Simbólica</h2>

<p id="leitura"></p>

<button onclick="window.print()">Salvar Relatório</button>

</div>

</div>

<footer>

O Código Interno

</footer>

<script>

let step=0

const steps=document.querySelectorAll(".step")

function next(){

steps[step].classList.remove("active")

step++

steps[step].classList.add("active")

updateProgress()

}

function updateProgress(){

let percent=(step/(steps.length-1))*100

document.getElementById("progress").style.width=percent+"%"

}

function gerar(){

const form=new FormData(document.getElementById("form"))

let vinculo=form.get("vinculo")
let dependencia=form.get("dependencia")
let objeto=form.get("objeto")
let pedra=form.get("pedra")

let leitura=""

if(vinculo){

leitura+="O vínculo descrito indica uma ligação emocional que ainda influencia suas decisões. "

}

if(dependencia==="Eu sou puxado"){

leitura+="Existe uma tendência de dependência emocional ativa nesta relação. "

}

if(dependencia==="A pessoa é puxada"){

leitura+="Existe uma dependência emocional da outra pessoa em relação a você. "

}

if(objeto){

leitura+="O objeto que apareceu pode representar um padrão emocional aprendido nessa relação. "

}

if(pedra){

leitura+="A presença de um obstáculo no caminho pode simbolizar sentimentos de culpa ligados ao avanço da sua vida. "

}

leitura+="Reorganizar simbolicamente essa relação pode liberar energia emocional para avançar na área escolhida."

document.getElementById("leitura").innerText=leitura

document.getElementById("resultado").style.display="block"

window.scrollTo(0,document.body.scrollHeight)

}

</script>

</body>
</html>
