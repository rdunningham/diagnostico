<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Diagnóstico do Código Interno</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f0f0f;
color:#fff;
margin:0;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.chat{
background:#1a1a1a;
padding:20px;
border-radius:12px;
height:70vh;
overflow-y:auto;
}

.msg{
margin:14px 0;
}

.bot{
color:#8fd3ff;
}

.user{
text-align:right;
}

.inputArea{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#4ea3ff;
color:white;
cursor:pointer;
font-size:16px;
}

.result{
display:none;
background:#151515;
padding:25px;
border-radius:12px;
margin-top:20px;
}

.cta{
margin-top:20px;
}

.cta a{
display:block;
text-align:center;
padding:14px;
background:#4ea3ff;
color:white;
border-radius:10px;
text-decoration:none;
margin-top:10px;
}

.analysis{
display:none;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Diagnóstico Simbólico</h1>

<div id="chat" class="chat"></div>

<div class="inputArea">

<input id="input" placeholder="Digite sua resposta..." />

<button onclick="send()">Enviar</button>

</div>

<div id="analysisBox" class="analysis">

<h3>Processando seu diagnóstico...</h3>
<p id="analysisStep">Iniciando análise simbólica...</p>

</div>

<div id="result" class="result"></div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("input")

let step=0

let respostas={}

const perguntas=[

{key:"nome",text:"Antes de começarmos, me confirma seu nome e sobrenome?"},

{key:"sala",text:"Agora imagine novamente a cena inicial. Como era a sala que você viu? Descreva cores, iluminação, móveis, janelas, sons ou cheiros."},

{key:"cubo",text:"No centro da sala existe um cubo. Como ele é? Grande ou pequeno? De que material parece ser feito?"},

{key:"escada",text:"Existe uma escada nesse ambiente. Como ela é? Para onde parece levar?"},

{key:"cavalo",text:"Agora aparece um cavalo. O que ele está fazendo? Está livre, parado, correndo?"},

{key:"vaca",text:"Também existe uma vaca nesse cenário. O que ela está fazendo?"},

{key:"cachorro",text:"Há um cachorro nesse ambiente. Ele parece amigável ou distante?"},

{key:"carro",text:"Em algum momento surge um carro. Como ele é? Novo, antigo, luxuoso?"},

{key:"trofeu",text:"Você encontra um troféu. Como ele é?"},

{key:"macaco",text:"Agora aparece um macaco. O que ele está fazendo?"},

{key:"fantasma",text:"Existe algum fantasma ou presença estranha no ambiente? Como você percebe isso?"},

{key:"goteira",text:"Existe alguma goteira no lugar? O que você percebe sobre ela?"},

{key:"reflexo",text:"Por fim você vê um reflexo seu. Onde está esse reflexo e como você se vê?"},

{key:"email",text:"Para gerar seu relatório completo em PDF, me informe seu melhor email."},

{key:"whatsapp",text:"E qual seu WhatsApp com DDD?"}

]

function bot(text){

let div=document.createElement("div")
div.className="msg bot"
div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function user(text){

let div=document.createElement("div")
div.className="msg user"
div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function send(){

let val=input.value.trim()

if(!val) return

user(val)

let key=perguntas[step].key

respostas[key]=val

input.value=""

step++

if(step<perguntas.length){

setTimeout(()=>bot(perguntas[step].text),600)

}else{

iniciarAnalise()

}

}

function iniciarAnalise(){

input.style.display="none"

document.getElementById("analysisBox").style.display="block"

const steps=[

"Organizando seus símbolos...",
"Interpretando padrões inconscientes...",
"Calculando frequência emocional...",
"Comparando com arquétipos universais...",
"Identificando arquétipo dominante...",
"Identificando arquétipo secundário...",
"Finalizando diagnóstico..."

]

let i=0

const interval=setInterval(()=>{

document.getElementById("analysisStep").innerText=steps[i]

i++

if(i>=steps.length){

clearInterval(interval)

mostrarResultado()

}

},1500)

}

function detectarArquetipo(texto){

texto=texto.toLowerCase()

if(texto.match(/luz|energia|espiritual|transformação/)) return "Mago"
if(texto.match(/viagem|caminho|descoberta/)) return "Explorador"
if(texto.match(/liderança|poder|controle/)) return "Governante"
if(texto.match(/criar|arte|imaginação/)) return "Criador"
if(texto.match(/cuidar|ajudar/)) return "Cuidador"
if(texto.match(/conhecimento|sabedoria/)) return "Sábio"

return "Herói"

}

function detectarFrequencia(texto){

if(texto.match(/medo|escuro|vazio/)) return 150
if(texto.match(/calmo|tranquilo|neutro/)) return 250
if(texto.match(/feliz|confiante/)) return 350
if(texto.match(/amor|luz|harmonia/)) return 500

return 300

}

function gerarPDF(arquetipo1,arquetipo2,frequencia){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let texto=`

Diagnóstico Simbólico

Nome: ${respostas.nome}

Arquétipo dominante: ${arquetipo1}
Arquétipo secundário: ${arquetipo2}

Frequência emocional estimada: ${frequencia}

Este diagnóstico é baseado nos símbolos
apresentados durante sua experiência.

Para entender mais profundamente
o significado desse resultado,
é possível realizar uma sessão
de análise personalizada.

`

doc.text(texto,10,20)

doc.save("diagnostico-codigo-interno.pdf")

}

function mostrarResultado(){

document.getElementById("analysisBox").style.display="none"

let textoCompleto=Object.values(respostas).join(" ")

let arquetipo1=detectarArquetipo(textoCompleto)

let arquetipo2="Explorador"

let frequencia=detectarFrequencia(textoCompleto)

gerarPDF(arquetipo1,arquetipo2,frequencia)

let result=document.getElementById("result")

result.style.display="block"

result.innerHTML=`

<h2>Seu diagnóstico está pronto</h2>

<p><b>Arquétipo dominante:</b> ${arquetipo1}</p>

<p><b>Arquétipo secundário:</b> ${arquetipo2}</p>

<p><b>Frequência emocional estimada:</b> ${frequencia}</p>

<div class="cta">

<h3>Quer entender o que seu resultado realmente significa?</h3>

<p>Eu faço uma análise pessoal do seu diagnóstico e explico os símbolos que apareceram na sua experiência.</p>

<p><b>Sessão individual online</b></p>

<p>Duração média: 50–60 minutos</p>

<p><b>Valor: R$347</b></p>

<a href="https://wa.me/5574999943621" target="_blank">

Agendar análise do meu diagnóstico

</a>

</div>

<div class="cta">

<h3>Quer uma explicação em áudio sobre seu resultado?</h3>

<p>Envie um depoimento sobre a experiência no meu Instagram e eu envio um áudio comentando seu diagnóstico.</p>

<a href="https://instagram.com/raveldunningham" target="_blank">

Enviar depoimento no Instagram

</a>

</div>

`

}

bot(perguntas[0].text)

</script>

</body>
</html>
